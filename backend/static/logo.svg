<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="walletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="walletTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="note1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <linearGradient id="note2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="note3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde047"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#6d28d9" stroke-width="2" opacity="0.5"/>

  <!-- Iraqi banknote 1 (green - 1000 IQD style) - tilted left -->
  <g transform="rotate(-18, 100, 95)" filter="url(#cardShadow)">
    <rect x="42" y="68" width="72" height="42" rx="5" fill="url(#note1Grad)"/>
    <rect x="42" y="68" width="72" height="8" rx="5" fill="#15803d"/>
    <rect x="42" y="68" width="72" height="8" ry="0" fill="#15803d"/>
    <!-- Lines simulating note details -->
    <line x1="52" y1="82" x2="85" y2="82" stroke="#86efac" stroke-width="1.2" opacity="0.6"/>
    <line x1="52" y1="87" x2="75" y2="87" stroke="#86efac" stroke-width="1" opacity="0.5"/>
    <line x1="52" y1="92" x2="80" y2="92" stroke="#86efac" stroke-width="1" opacity="0.4"/>
    <!-- Value text -->
    <text x="99" y="91" font-size="7.5" fill="#dcfce7" text-anchor="middle" font-family="Arial" font-weight="bold">١٠٠٠</text>
    <!-- Small decorative circle -->
    <circle cx="55" cy="84" r="6" fill="none" stroke="#86efac" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Iraqi banknote 2 (red - 5000 IQD style) - tilted right -->
  <g transform="rotate(15, 100, 95)" filter="url(#cardShadow)">
    <rect x="46" y="65" width="72" height="42" rx="5" fill="url(#note3Grad)"/>
    <rect x="46" y="65" width="72" height="8" rx="5" fill="#b91c1c"/>
    <rect x="46" y="65" width="72" height="8" ry="0" fill="#b91c1c"/>
    <line x1="56" y1="80" x2="89" y2="80" stroke="#fca5a5" stroke-width="1.2" opacity="0.6"/>
    <line x1="56" y1="85" x2="79" y2="85" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>
    <line x1="56" y1="90" x2="84" y2="90" stroke="#fca5a5" stroke-width="1" opacity="0.4"/>
    <text x="103" y="89" font-size="7.5" fill="#fee2e2" text-anchor="middle" font-family="Arial" font-weight="bold">٥٠٠٠</text>
    <circle cx="59" cy="82" r="6" fill="none" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Iraqi banknote 3 (blue - 10000 IQD style) - center/front -->
  <g transform="rotate(-4, 100, 95)" filter="url(#cardShadow)">
    <rect x="44" y="62" width="76" height="44" rx="5" fill="url(#note2Grad)"/>
    <rect x="44" y="62" width="76" height="9" rx="5" fill="#1d4ed8"/>
    <rect x="44" y="62" width="76" height="9" ry="0" fill="#1d4ed8"/>
    <line x1="54" y1="77" x2="91" y2="77" stroke="#93c5fd" stroke-width="1.3" opacity="0.7"/>
    <line x1="54" y1="83" x2="81" y2="83" stroke="#93c5fd" stroke-width="1.1" opacity="0.6"/>
    <line x1="54" y1="89" x2="86" y2="89" stroke="#93c5fd" stroke-width="1.1" opacity="0.5"/>
    <line x1="54" y1="95" x2="78" y2="95" stroke="#93c5fd" stroke-width="1" opacity="0.4"/>
    <text x="104" y="92" font-size="8" fill="#dbeafe" text-anchor="middle" font-family="Arial" font-weight="bold">١٠٠٠٠</text>
    <circle cx="57" cy="80" r="7" fill="none" stroke="#93c5fd" stroke-width="1.2" opacity="0.6"/>
    <!-- IQD watermark -->
    <text x="112" y="101" font-size="5.5" fill="#dbeafe" text-anchor="middle" font-family="Arial" opacity="0.5">IQD</text>
  </g>

  <!-- Wallet body (back) -->
  <rect x="34" y="98" width="132" height="82" rx="12" fill="url(#walletGrad)" filter="url(#shadow)"/>

  <!-- Wallet flap/top -->
  <rect x="34" y="85" width="132" height="30" rx="10" fill="url(#walletTop)"/>

  <!-- Wallet inside darker area -->
  <rect x="40" y="112" width="120" height="60" rx="8" fill="#4c1d95" opacity="0.5"/>

  <!-- Coin slot / card pocket -->
  <rect x="118" y="118" width="34" height="22" rx="6" fill="#5b21b6" opacity="0.7"/>
  <circle cx="135" cy="129" r="7" fill="url(#coinGrad)"/>
  <text x="135" y="133" font-size="8" fill="#78350f" text-anchor="middle" font-family="Arial" font-weight="bold">د.ع</text>

  <!-- Wallet clasp/button -->
  <circle cx="100" cy="85" r="6" fill="#a78bfa"/>
  <circle cx="100" cy="85" r="3.5" fill="#7c3aed"/>

  <!-- Sparkle decorations -->
  <g fill="#fde047" opacity="0.85">
    <polygon points="166,36 168,42 174,42 169,46 171,52 166,48 161,52 163,46 158,42 164,42" transform="scale(0.65) translate(88,30)"/>
    <polygon points="30,20 31.5,24.5 36,24.5 32.5,27.5 34,32 30,29 26,32 27.5,27.5 24,24.5 28.5,24.5" transform="scale(0.5) translate(10,10)"/>
    <polygon points="160,155 161,158 164,158 161.5,160 162.5,163 160,161 157.5,163 158.5,160 156,158 159,158" transform="scale(0.55) translate(130,110)"/>
  </g>

  <!-- App name below wallet -->
  <text x="100" y="190" font-size="15" fill="#e9d5ff" text-anchor="middle" font-family="'Cairo', Arial, sans-serif" font-weight="700" letter-spacing="1">مصاريفي</text>
</svg>
