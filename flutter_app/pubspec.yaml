name: masareefi
description: Daily expense tracker with AI voice input — مصاريفي
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP
  dio: ^5.7.0

  # Secure storage (JWT tokens)
  flutter_secure_storage: ^9.2.2

  # Local preferences (language, theme)
  shared_preferences: ^2.3.2

  # Charts
  fl_chart: ^0.69.0

  # Audio recording
  record: ^5.1.2
  just_audio: ^0.9.40
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  file_picker: ^8.1.2

  # UI
  iconsax: ^0.0.8
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/animations/

  generate: true
